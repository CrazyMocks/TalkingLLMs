<!doctype html>
<html lang="pl">

<head>
  <meta charset="UTF-8" />
  <title>Chat view</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family:
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        sans-serif;
      background: #e5ddd5;
    }

    .chat-container {
      max-width: 100%;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: row;
    }

    .controls {
      background: #ffffff;
      padding: 20px;
      border-left: 1px solid #ddd;
      box-shadow: -2px 0 4px rgba(0, 0, 0, 0.1);
      width: 320px;
      min-width: 320px;
      max-width: 320px;
      overflow-y: auto;
      order: 2;
    }

    .controls h3 {
      margin: 0 0 10px 0;
      font-size: 1.1em;
      color: #333;
    }

    .folder-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 10px;
    }

    .folder-option {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .folder-option input[type="radio"] {
      cursor: pointer;
    }

    .folder-option label {
      cursor: pointer;
      font-size: 0.95em;
    }

    .custom-folder-picker {
      margin-left: 24px;
      margin-top: 5px;
      display: none;
    }

    .custom-folder-picker.active {
      display: block;
    }

    .custom-folder-picker input[type="file"] {
      font-size: 0.9em;
    }

    .load-button {
      background: #25d366;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1em;
      font-weight: 500;
      transition: background 0.2s;
    }

    .load-button:hover {
      background: #20ba5a;
    }

    .load-button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .chat {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      order: 1;
      max-width: calc(100% - 320px);
    }

    /* Dymki */
    .message {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.6;
      word-wrap: break-word;
    }

    /* Markdown formatting */
    .message h1,
    .message h2,
    .message h3 {
      margin: 0.5em 0 0.3em 0;
      font-weight: 600;
    }

    .message h1 {
      font-size: 1.5em;
    }

    .message h2 {
      font-size: 1.3em;
    }

    .message h3 {
      font-size: 1.1em;
    }

    .message p {
      margin: 0.5em 0;
    }

    .message strong {
      font-weight: 600;
    }

    .message em {
      font-style: italic;
    }

    .message code {
      background: rgba(0, 0, 0, 0.08);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 0.9em;
    }

    .message pre {
      background: rgba(0, 0, 0, 0.08);
      padding: 10px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 0.5em 0;
    }

    .message pre code {
      background: none;
      padding: 0;
    }

    .message ul,
    .message ol {
      margin: 0.5em 0;
      padding-left: 1.5em;
    }

    .message li {
      margin: 0.2em 0;
    }

    .message a {
      color: #0066cc;
      text-decoration: none;
    }

    .message a:hover {
      text-decoration: underline;
    }

    /* Lewa strona */
    .message.left {
      align-self: flex-start;
      background: #ffffff;
      border-top-left-radius: 0;
    }

    /* Prawa strona */
    .message.right {
      align-self: flex-end;
      background: #dcf8c6;
      border-top-right-radius: 0;
    }

    /* Status wczytywania */
    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
      font-style: italic;
    }

    .error {
      text-align: center;
      padding: 20px;
      color: #d32f2f;
      background: #ffebee;
      border-radius: 8px;
      margin: 20px;
    }
  </style>
</head>

<body>
  <div class="chat-container">
    <div class="controls">
      <h3>Wybierz lokalizację plików wiadomości</h3>
      <div class="folder-options">
        <div class="folder-option">
          <input type="radio" id="defaultLocation" name="folderChoice" value="default" checked>
          <label for="defaultLocation">Lokalizacja domyślna (katalog główny)</label>
        </div>
        <div class="folder-option">
          <input type="radio" id="customLocation" name="folderChoice" value="custom">
          <label for="customLocation">Własny folder</label>
        </div>
        <div class="custom-folder-picker" id="customFolderPicker">
          <input type="file" id="folderInput" webkitdirectory directory multiple>
        </div>
      </div>
      <button class="load-button" id="loadButton">Wczytaj wiadomości</button>
    </div>
    <div class="chat" id="chat">
      <div class="loading">Wczytywanie wiadomości...</div>
    </div>
  </div>

  <script>
    let selectedFiles = null;

    function parseMessages(text) {
      return text
        .split("---ENDOFMESSAGE---TALKINGLLMS---")
        .map((m) => m.trim())
        .filter((m) => m.length > 0);
    }

    async function loadMessagesFromDefault(filename) {
      try {
        const response = await fetch(filename);
        if (!response.ok) {
          throw new Error(`Nie można wczytać pliku ${filename}`);
        }
        return await response.text();
      } catch (error) {
        console.error(`Błąd wczytywania ${filename}:`, error);
        throw error;
      }
    }

    async function loadMessagesFromCustomFolder(filename) {
      if (!selectedFiles) {
        throw new Error("Nie wybrano folderu");
      }

      const file = Array.from(selectedFiles).find((f) => f.name === filename);
      if (!file) {
        throw new Error(`Nie znaleziono pliku ${filename} w wybranym folderze`);
      }

      return await file.text();
    }

    async function renderChat(useCustomFolder = false) {
      const chat = document.getElementById("chat");
      chat.innerHTML = "";

      try {
        let textA, textB;

        if (useCustomFolder) {
          // Wczytaj z wybranego folderu
          [textA, textB] = await Promise.all([
            loadMessagesFromCustomFolder("messagesA"),
            loadMessagesFromCustomFolder("messagesB"),
          ]);
        } else {
          // Wczytaj z lokalizacji domyślnej
          [textA, textB] = await Promise.all([
            loadMessagesFromDefault("messagesA"),
            loadMessagesFromDefault("messagesB"),
          ]);
        }

        const A = parseMessages(textA);
        const B = parseMessages(textB);

        const maxLen = Math.max(A.length, B.length);

        for (let i = 0; i < maxLen; i++) {
          if (A[i]) addMessage(A[i], "left");
          if (B[i]) addMessage(B[i], "right");
        }

        chat.scrollTop = chat.scrollHeight;
      } catch (error) {
        chat.innerHTML = `<div class="error">Błąd: ${error.message}</div>`;
      }
    }

    function addMessage(text, side) {
      const div = document.createElement("div");
      div.className = `message ${side}`;
      div.innerHTML = marked.parse(text);
      document.getElementById("chat").appendChild(div);
    }

    // Event listeners
    window.addEventListener("DOMContentLoaded", () => {
      const defaultRadio = document.getElementById("defaultLocation");
      const customRadio = document.getElementById("customLocation");
      const customFolderPicker = document.getElementById("customFolderPicker");
      const folderInput = document.getElementById("folderInput");
      const loadButton = document.getElementById("loadButton");

      // Toggle custom folder picker visibility
      customRadio.addEventListener("change", () => {
        if (customRadio.checked) {
          customFolderPicker.classList.add("active");
        }
      });

      defaultRadio.addEventListener("change", () => {
        if (defaultRadio.checked) {
          customFolderPicker.classList.remove("active");
        }
      });

      // Handle folder selection
      folderInput.addEventListener("change", (e) => {
        selectedFiles = e.target.files;
        console.log("Wybrano pliki:", Array.from(selectedFiles).map(f => f.name));
      });

      // Handle load button click
      loadButton.addEventListener("click", () => {
        const useCustomFolder = customRadio.checked;

        if (useCustomFolder && (!selectedFiles || selectedFiles.length === 0)) {
          alert("Proszę wybrać folder z plikami wiadomości");
          return;
        }

        renderChat(useCustomFolder);
      });

      // Auto-load from default location on page load
      renderChat(false);
    });
  </script>
</body>

</html>
